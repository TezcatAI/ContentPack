slug: all-probes
version: "1.2.0"
name: "All Official Tezcat Probes"
description: >
  Runs all official first-party capability-probe prompts: the baseline
  self-report tier and the harder behavioral self-demonstration tier. A good
  starting point for a full capability assessment of an AI agent.
resolver_mode: explicit_list
enabled: true
